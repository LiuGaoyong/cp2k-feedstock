name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - CONFIG: linux_64_mpimpich
          - CONFIG: linux_64_mpiopenmpi
    steps:
      - uses: actions/checkout@v6
      - name: Setup rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.38
        with:
          setup-only: true
      - name: Build and upload
        run: |
          rattler-build build           \
            --output-dir dist           \
            --recipe recipe/recipe.yaml \
            -m .ci_support/${{ matrix.config }}.yaml
          ls -lh dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: conda-${{ matrix.config }}
          path: dist/*.conda

  release:
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download all the dists A
        uses: actions/download-artifact@v8
        with:
          name: conda-*
          path: dist
      - run: ls -lh dist/*
      - name: Release & Upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: false
          artifacts: "dist/*"